<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Engine — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #181c27;
      --border:  #2a2f3e;
      --accent:  #5b8cf7;
      --text:    #e8eaf0;
      --muted:   #7a80a0;
      --error:   #f87171;
      --success: #4ade80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 6px;
    }

    h1 em { font-style: italic; color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--accent); }

    button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .message {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      line-height: 1.5;
    }

    .message.error { color: var(--error); }
    .message.success { color: var(--success); }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }

    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Knowledge <em>Engine</em></h1>

    <!-- Step 1: Request reset email -->
    <div id="request-form">
      <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reset-email" placeholder="you@example.com" />
      </div>
      <button id="request-btn" onclick="handleRequest()">Send Reset Link</button>
      <div class="message" id="request-msg"></div>
      <a class="back-link" href="/login">Back to sign in</a>
    </div>

    <!-- Step 2: Set new password (shown after clicking email link) -->
    <div id="new-password-form" style="display:none">
      <p class="subtitle">Enter your new password below.</p>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="At least 6 characters" />
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat your new password" />
      </div>
      <button id="update-btn" onclick="handleUpdate()">Update Password</button>
      <div class="message" id="update-msg"></div>
    </div>
  </div>

  <script>
    // Check if this page was opened from a password reset email link.
    // Supabase puts the token in the URL hash when the user clicks the link.
    // e.g. /reset-password#access_token=...&type=recovery
    function getHashParams() {
      const hash = window.location.hash.substring(1);
      return Object.fromEntries(new URLSearchParams(hash));
    }

    const params = getHashParams();
    if (params.type === 'recovery' && params.access_token) {
      // User came from a reset email — show the new password form
      document.getElementById('request-form').style.display = 'none';
      document.getElementById('new-password-form').style.display = 'block';
    }

    async function handleRequest() {
      const email = document.getElementById('reset-email').value.trim();
      const btn = document.getElementById('request-btn');
      const msg = document.getElementById('request-msg');

      if (!email) {
        msg.className = 'message error';
        msg.textContent = 'Please enter your email.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';
      msg.className = 'message';
      msg.textContent = '';

      try {
        const res = await fetch('/request-reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.message) {
          msg.className = 'message success';
          msg.textContent = data.message;
        } else {
          msg.className = 'message error';
          msg.textContent = data.error || 'Something went wrong.';
        }
      } catch (e) {
        msg.className = 'message error';
        msg.textContent = 'Something went wrong.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    }

    async function handleUpdate() {
      const password = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const btn = document.getElementById('update-btn');
      const msg = document.getElementById('update-msg');

      if (password !== confirm) {
        msg.className = 'message error';
        msg.textContent = 'Passwords do not match.';
        return;
      }

      if (password.length < 6) {
        msg.className = 'message error';
        msg.textContent = 'Password must be at least 6 characters.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';
      msg.className = 'message';
      msg.textContent = '';

      try {
        const res = await fetch('/update-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            password,
            access_token: params.access_token
          })
        });
        const data = await res.json();
        if (data.message) {
          msg.className = 'message success';
          msg.textContent = data.message + ' Redirecting to login...';
          setTimeout(() => window.location.href = '/login', 2000);
        } else {
          msg.className = 'message error';
          msg.textContent = data.error || 'Something went wrong.';
        }
      } catch (e) {
        msg.className = 'message error';
        msg.textContent = 'Something went wrong.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Update Password';
      }
    }
  </script>
</body>
</html>
