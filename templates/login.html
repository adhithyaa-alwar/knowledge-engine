<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Engine — Sign In</title>
  <script>
    // If Supabase redirected here with a password recovery token
    // (instead of /forgot-password), forward it to the right page
    // so the reset password form can pick it up.
    if (window.location.hash.includes('type=recovery')) {
      window.location.replace('/forgot-password' + window.location.hash);
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #181c27;
      --border:  #2a2f3e;
      --accent:  #5b8cf7;
      --text:    #e8eaf0;
      --muted:   #7a80a0;
      --error:   #f87171;
      --success: #4ade80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 6px;
    }

    h1 em { font-style: italic; color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 32px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }

    .tab.active {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--accent); }

    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    button[type="submit"]:hover { opacity: 0.85; }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; }

    .message {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }

    .message.error { color: var(--error); }
    .message.success { color: var(--success); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Knowledge <em>Engine</em></h1>
    <p class="subtitle">Ask anything. From any source.</p>

    <div class="tabs">
      <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</div>
      <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <div id="form-signin">
      <div class="field">
        <label>Email</label>
        <input type="email" id="signin-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signin-password" placeholder="••••••••" />
      </div>
      <button type="submit" id="signin-btn" onclick="handleSignIn()">Sign In</button>
      <div class="message" id="signin-msg"></div>
      <a href="/forgot-password" style="display:block;text-align:center;margin-top:14px;font-size:13px;color:var(--muted);text-decoration:none;">Forgot password?</a>
    </div>

    <div id="form-signup" style="display:none">
      <div class="field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="At least 6 characters" />
      </div>
      <button type="submit" id="signup-btn" onclick="handleSignUp()">Create Account</button>
      <div class="message" id="signup-msg"></div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none';
      document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    }

    async function handleSignIn() {
      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      const btn = document.getElementById('signin-btn');
      const msg = document.getElementById('signin-msg');

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      msg.className = 'message';
      msg.textContent = '';

      try {
        const res = await fetch('/signin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else {
          msg.className = 'message error';
          msg.textContent = data.error || 'Sign in failed.';
        }
      } catch (e) {
        msg.className = 'message error';
        msg.textContent = 'Something went wrong.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function handleSignUp() {
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const btn = document.getElementById('signup-btn');
      const msg = document.getElementById('signup-msg');

      btn.disabled = true;
      btn.textContent = 'Creating account...';
      msg.className = 'message';
      msg.textContent = '';

      try {
        const res = await fetch('/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.message) {
          msg.className = 'message success';
          msg.textContent = data.message;
        } else {
          msg.className = 'message error';
          msg.textContent = data.error || 'Signup failed.';
        }
      } catch (e) {
        msg.className = 'message error';
        msg.textContent = 'Something went wrong.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const activeTab = document.getElementById('tab-signin').classList.contains('active');
        if (activeTab) handleSignIn();
        else handleSignUp();
      }
    });
  </script>
</body>
</html>
