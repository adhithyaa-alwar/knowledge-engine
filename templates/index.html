<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --border:    #2a2f3e;
      --accent:    #5b8cf7;
      --accent-dim:#2a3a6e;
      --text:      #e8eaf0;
      --muted:     #7a80a0;
      --answer-bg: #131720;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 80px;
    }

    nav {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    nav .brand {
      font-family: 'Instrument Serif', serif;
      font-size: 1.2rem;
      font-weight: 400;
    }

    nav .brand em { font-style: italic; color: var(--accent); }

    nav .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    nav .logout {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 6px;
      transition: color 0.15s, border-color 0.15s;
    }

    nav .logout:hover { color: var(--text); border-color: var(--text); }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400;
      color: var(--text);
      line-height: 1.1;
    }

    header h1 em { font-style: italic; color: var(--accent); }
    header p { margin-top: 10px; color: var(--muted); font-size: 14px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 680px;
      margin-bottom: 20px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .search-row { display: flex; gap: 10px; }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #results-list { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }

    .result-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: border-color 0.15s, background 0.15s;
    }

    .result-item:hover { border-color: var(--accent); background: var(--accent-dim); }
    .result-item.selected { border-color: var(--accent); background: var(--accent-dim); color: #fff; }

    #selected-page { display: none; margin-top: 12px; font-size: 13px; color: var(--accent); font-weight: 500; }
    #question-card { display: none; }

    #qa-history { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 16px; }

    .qa-pair {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .qa-question {
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .qa-question span { color: var(--text); }

    .page-tag {
      font-size: 11px;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .qa-answer {
      padding: 16px 20px;
      font-size: 14px;
      line-height: 1.7;
      background: var(--answer-bg);
      white-space: pre-wrap;
    }

    .qa-answer.loading { color: var(--muted); font-style: italic; }
    .qa-answer.error { color: #f87171; }

    /* Streaming cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* History */
    .history-toggle {
      width: 100%;
      max-width: 680px;
      margin-bottom: 16px;
      text-align: right;
    }

    .history-toggle button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      padding: 6px 14px;
    }

    .history-toggle button:hover { color: var(--text); border-color: var(--text); opacity: 1; }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .history-item:hover { border-color: var(--accent); }

    .history-item-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .history-item-left { display: flex; flex-direction: column; gap: 4px; }
    .h-page { color: var(--accent); font-weight: 500; font-size: 13px; }
    .h-question { color: var(--text); font-size: 13px; }
    .h-time { color: var(--muted); font-size: 11px; }

    .expand-icon {
      color: var(--muted);
      font-size: 18px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .history-item.expanded .expand-icon { transform: rotate(180deg); }

    .history-item-body {
      display: none;
      padding: 14px 18px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      background: var(--answer-bg);
      border-top: 1px solid var(--border);
      white-space: pre-wrap;
    }

    .history-item.expanded .history-item-body { display: block; }
  </style>
</head>
<body>

  <nav>
    <div class="brand">Knowledge <em>Engine</em></div>
    <div class="user-info">
      <span>{{ email }}</span>
      <a class="logout" href="/logout">Sign out</a>
    </div>
  </nav>

  <header>
    <h1>Ask <em>anything</em></h1>
    <p>Powered by Groq — your history is saved automatically.</p>
  </header>

  <div class="card">
    <div class="card-label">Choose a Wikipedia page</div>
    <div class="search-row">
      <input type="text" id="search-input" placeholder="Search Wikipedia..." />
      <button id="search-btn">Search</button>
    </div>
    <div id="results-list"></div>
    <div id="selected-page"></div>
  </div>

  <div class="card" id="question-card">
    <div class="card-label">Ask a question</div>
    <div class="search-row">
      <input type="text" id="question-input" placeholder="What would you like to know?" />
      <button id="ask-btn">Ask</button>
    </div>
  </div>

  <div class="history-toggle">
    <button onclick="toggleHistory()">Show my history</button>
  </div>

  <div id="qa-history"></div>

  <script>
    let selectedPage = null;
    let showingHistory = false;

    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');
    const resultsList = document.getElementById('results-list');
    const selectedPageEl = document.getElementById('selected-page');
    const questionCard = document.getElementById('question-card');
    const questionInput = document.getElementById('question-input');
    const askBtn = document.getElementById('ask-btn');
    const qaHistory = document.getElementById('qa-history');

    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') searchBtn.click(); });
    questionInput.addEventListener('keydown', e => { if (e.key === 'Enter') askBtn.click(); });

    searchBtn.addEventListener('click', async () => {
      const query = searchInput.value.trim();
      if (!query) return;
      searchBtn.disabled = true;
      searchBtn.textContent = 'Searching...';
      resultsList.innerHTML = '';
      selectedPage = null;
      selectedPageEl.style.display = 'none';
      questionCard.style.display = 'none';

      try {
        const res = await fetch('/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });
        const data = await res.json();
        if (data.error) {
          resultsList.innerHTML = `<div style="color:#f87171;font-size:13px">${data.error}</div>`;
          return;
        }
        data.results.forEach(title => {
          const item = document.createElement('div');
          item.className = 'result-item';
          item.textContent = title;
          item.addEventListener('click', () => selectPage(title, item));
          resultsList.appendChild(item);
        });
      } catch (err) {
        resultsList.innerHTML = `<div style="color:#f87171;font-size:13px">Search failed.</div>`;
      } finally {
        searchBtn.disabled = false;
        searchBtn.textContent = 'Search';
      }
    });

    function selectPage(title, el) {
      document.querySelectorAll('.result-item').forEach(i => i.classList.remove('selected'));
      el.classList.add('selected');
      selectedPage = title;
      selectedPageEl.textContent = `Using: ${title}`;
      selectedPageEl.style.display = 'block';
      questionCard.style.display = 'block';
      questionInput.focus();
    }

    askBtn.addEventListener('click', async () => {
      const question = questionInput.value.trim();
      if (!question || !selectedPage) return;

      askBtn.disabled = true;
      askBtn.textContent = 'Thinking...';
      questionInput.value = '';
      showingHistory = false;

      // Create the Q&A pair in the UI
      const pair = document.createElement('div');
      pair.className = 'qa-pair';
      pair.innerHTML = `
        <div class="qa-question">
          Q: <span>${escapeHtml(question)}</span>
          <span class="page-tag">${escapeHtml(selectedPage)}</span>
        </div>
        <div class="qa-answer"></div>
      `;
      qaHistory.insertBefore(pair, qaHistory.firstChild);
      const answerEl = pair.querySelector('.qa-answer');

      // Add blinking cursor while streaming
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      answerEl.appendChild(cursor);

      try {
        // Use fetch to POST, then read the SSE stream from the response body
        const res = await fetch('/ask-stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ page: selectedPage, question })
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line in buffer

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const token = line.slice(6); // strip "data: "

            if (token === '[DONE]') {
              cursor.remove();
              break;
            }
            if (token.startsWith('[ERROR]')) {
              answerEl.classList.add('error');
              answerEl.textContent = token.slice(7);
              cursor.remove();
              break;
            }

            // Insert token before the cursor
            answerEl.insertBefore(document.createTextNode(token), cursor);
          }
        }
      } catch (err) {
        answerEl.classList.add('error');
        answerEl.textContent = 'Request failed.';
        cursor.remove();
      } finally {
        askBtn.disabled = false;
        askBtn.textContent = 'Ask';
      }
    });

    async function toggleHistory() {
      const btn = document.querySelector('.history-toggle button');
      if (showingHistory) {
        showingHistory = false;
        qaHistory.innerHTML = '';
        btn.textContent = 'Show my history';
        return;
      }

      btn.textContent = 'Loading...';
      try {
        const res = await fetch('/history');
        const data = await res.json();
        qaHistory.innerHTML = '';
        showingHistory = true;
        btn.textContent = 'Hide history';

        if (!data.history.length) {
          qaHistory.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center">No history yet.</div>';
          return;
        }

        data.history.forEach(item => {
          const el = document.createElement('div');
          el.className = 'history-item';
          el.innerHTML = `
            <div class="history-item-header" onclick="toggleHistoryItem(this.parentElement)">
              <div class="history-item-left">
                <div class="h-page">${escapeHtml(item.page_title)}</div>
                <div class="h-question">${escapeHtml(item.question)}</div>
                <div class="h-time">${new Date(item.created_at).toLocaleString()}</div>
              </div>
              <div class="expand-icon">⌄</div>
            </div>
            <div class="history-item-body">${escapeHtml(item.answer)}</div>
          `;
          qaHistory.appendChild(el);
        });
      } catch (e) {
        btn.textContent = 'Show my history';
      }
    }

    function toggleHistoryItem(el) {
      el.classList.toggle('expanded');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
